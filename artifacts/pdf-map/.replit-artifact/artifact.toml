kind = "web"
previewPath = "/"
title = "PDF Map Viewer"
version = "1.0.0"
id = "artifacts/pdf-map"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23844

[services.development]
run = "pnpm --filter @workspace/pdf-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-map", "run", "build" ]
publicDir = "artifacts/pdf-map/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23844"
BASE_PATH = "/"
